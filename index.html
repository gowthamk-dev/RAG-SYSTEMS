<!DOCTYPE html>
<html>
<head>
<title>RAG Use Cases Dashboard</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:40px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:40px;
}

.card{
background:white;
padding:20px;
margin:15px;
width:260px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

#demoBox{
display:none;
margin-top:40px;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px 15px;
background:#0077ff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#response{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>🧠 RAG Enterprise Use Cases</h1>
<p>Interactive MVP Demonstration</p>

<div class="container">

<div class="card" onclick="openDemo('employee')">
<h3>Employee Knowledge Base</h3>
<p>Internal company policy assistant</p>
</div>

<div class="card" onclick="openDemo('ticket')">
<h3>Ticket Autocomplete</h3>
<p>Auto-suggest support ticket responses</p>
</div>

<div class="card" onclick="openDemo('compliance')">
<h3>Compliance Audit</h3>
<p>Legal policy compliance checker</p>
</div>

<div class="card" onclick="openDemo('docs')">
<h3>Docs Assist</h3>
<p>Document question answering assistant</p>
</div>

</div>

<!-- DEMO UI -->
<div id="demoBox">
<h2 id="demoTitle"></h2>

<input type="text" id="question" placeholder="Ask your question..." />
<button onclick="askQuestion()">Search</button>

<div id="response"></div>
</div>

<script>

let currentMode = "";

function openDemo(mode){
  currentMode = mode;
  document.getElementById("demoBox").style.display = "block";

  let titles = {
    employee: "👥 Employee Assistant",
    ticket: "🎫 Ticket Assistant",
    compliance: "⚖️ Compliance Assistant",
    docs: "📄 Docs Assistant"
  };

  document.getElementById("demoTitle").innerText = titles[mode];
}

function askQuestion(){
  let q = document.getElementById("question").value.toLowerCase();
  let ans = "";

  if(currentMode === "employee"){
    if(q.includes("age")) ans = "Employee age is 25 years.";
    else if(q.includes("leave")) ans = "12 paid leaves per year.";
    else ans = "No employee data found.";
  }

  else if(currentMode === "ticket"){
    ans = "Suggested reply: Please restart your system and try again.";
  }

  else if(currentMode === "compliance"){
    ans = "Policy is compliant with legal standards.";
  }

  else if(currentMode === "docs"){
    ans = "Document explains system architecture and usage.";
  }

  document.getElementById("response").innerText = ans;
}

</script>

</body>
</html>
