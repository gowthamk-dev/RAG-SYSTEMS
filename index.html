<!DOCTYPE html>
<html>
<head>
<title>RAG Use Cases Dashboard</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

h1{ margin-top:30px; }

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.card{
background:white;
padding:20px;
margin:15px;
width:260px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

#demoBox{
display:none;
margin-top:40px;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px;
background:#0077ff;
color:white;
border:none;
border-radius:5px;
}

#response{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>🧠 RAG Enterprise Use Cases</h1>
<p>Select a use case and ask a question</p>

<div class="container">

<div class="card" onclick="openDemo('employee')">
<h3>Employee Knowledge</h3>
<p>Company policy assistant</p>
</div>

<div class="card" onclick="openDemo('ticket')">
<h3>Ticket Autocomplete</h3>
<p>Support responses</p>
</div>

<div class="card" onclick="openDemo('compliance')">
<h3>Compliance Audit</h3>
<p>Legal checker</p>
</div>

<div class="card" onclick="openDemo('docs')">
<h3>Docs Assist</h3>
<p>Document Q&A</p>
</div>

<div class="card" onclick="openDemo('phi3')">
<h3>RAG Phi3</h3>
<p>Textfile assistant</p>
</div>

<div class="card" onclick="openDemo('college')">
<h3>College Assistant</h3>
<p>Student queries</p>
</div>

</div>

<div id="demoBox">
<h2 id="title"></h2>

<input id="question" placeholder="Ask your question..." />
<button onclick="ask()">Search</button>

<div id="response"></div>
</div>

<script>

let mode = "";

function openDemo(m){
  mode = m;
  document.getElementById("demoBox").style.display="block";

  const titles = {
    employee:"👥 Employee Assistant",
    ticket:"🎫 Ticket Assistant",
    compliance:"⚖️ Compliance Assistant",
    docs:"📄 Docs Assistant",
    phi3:"🤖 Phi3 Assistant",
    college:"🎓 College Assistant"
  };

  document.getElementById("title").innerText = titles[m];
}

function ask(){
  let q = document.getElementById("question").value.toLowerCase();
  let ans = "";

  // EMPLOYEE
  if(mode==="employee"){
    if(q.includes("age")) ans="Employee age is 25 years.";
    else if(q.includes("leave")) ans="12 paid leaves per year.";
    else if(q.includes("salary")) ans="Salary is confidential.";
    else ans="No employee data found.";
  }

  // TICKET
  else if(mode==="ticket"){
    if(q.includes("error")) ans="Please restart your system.";
    else ans="Suggested response: Check your connection.";
  }

  // COMPLIANCE
  else if(mode==="compliance"){
    if(q.includes("policy")) ans="Policy is compliant.";
    else ans="No compliance issues found.";
  }

  // DOCS
  else if(mode==="docs"){
    if(q.includes("architecture")) ans="System uses RAG pipeline.";
    else ans="Document info not found.";
  }

  // PHI3
  else if(mode==="phi3"){
    if(q.includes("temple")) ans="Ondiputhur temple is famous.";
    else ans="No data found in textfile.";
  }

  // COLLEGE
  else if(mode==="college"){
    if(q.includes("attendance")) ans="75% attendance required.";
    else if(q.includes("placement")) ans="Placement starts in final year.";
    else ans="No student data found.";
  }

  document.getElementById("response").innerText = ans;
}

</script>

</body>
</html>
